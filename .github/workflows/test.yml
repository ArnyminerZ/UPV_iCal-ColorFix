name: Run Node Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    name: ✅ Test
    steps:
      - name: 🖥️ Checkout
        uses: actions/checkout@v6
      - name: 🟢 Setup node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 18
      - name: ☁️ Install dependencies
        run: npm install
      - name: ✅ Run tests
        run: npm run test
